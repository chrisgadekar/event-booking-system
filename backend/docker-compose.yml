services:
  mongo:
    image: mongo:7
    container_name: sortmyscene-mongo
    restart: unless-stopped
    # Run as a single-node replica set so multi-document transactions work.
    command: ['--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # Doubles as a one-time initiator: initiates the replica set if needed.
      test: >
        mongosh --quiet --eval "try { rs.status().ok } catch (e) {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'localhost:27017' }] }).ok
        }"
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  mongo_data:
